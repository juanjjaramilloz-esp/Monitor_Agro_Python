name: Actualización de datos en días hábiles

# Recolecta las fuentes y refresca el histórico versionado. Streamlit Community
# Cloud redespliega solo al recibir el push. Las fuentes por scraping (FNC) o
# yfinance pueden fallar de forma puntual: los pasos de datos toleran errores y
# el commit ocurre únicamente si hay cambios reales en datos/.

on:
  schedule:
    # Lunes a viernes a las 10:00 UTC (~05:00 Colombia), siguiendo el ritmo
    # de publicación diaria de la FNC (el trío precio/Coffee C/TRM sale en
    # días hábiles). Sin corridas sábado/domingo: la FNC no publica ese día.
    - cron: "0 10 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: actualizar-datos
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    # Si una fuente (FNC, yfinance) se cuelga, el job no debe consumir las
    # 6 horas máximas del runner.
    timeout-minutes: 20
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      # El histórico es idempotente y hace merge; basta refrescar una ventana
      # reciente en vez de redescargar todo desde 2023.
      - name: Actualizar histórico (últimos 120 días)
        continue-on-error: true
        run: python -m procesar.historico --desde "$(date -u -d '120 days ago' +%Y-%m-%d)"

      - name: Recalcular indicadores
        continue-on-error: true
        run: python -m procesar.indicadores

      - name: Actualizar calibracion oficial del simulador
        continue-on-error: true
        run: python -m procesar.calibracion_fnc

      - name: Preparar series de visualización
        continue-on-error: true
        run: python -m procesar.visualizacion

      # procesar.unir vuelve a consultar las fuentes en vivo (no lee el
      # histórico ya actualizado), incluida la página FNC que este mismo run
      # ya golpeó dos veces (historico + calibracion_fnc). Se limita a una
      # vez por semana ISO (lunes-domingo) para que sea un snapshot semanal
      # de verdad y no ~15 archivos al mes ni una tercera descarga FNC en
      # cada corrida.
      - name: Generar snapshot semanal si aún no existe esta semana
        continue-on-error: true
        run: |
          dow=$(date -u +%u)
          lunes=$(date -u -d "-$((dow - 1)) days" +%Y-%m-%d)
          existe_esta_semana=false
          for f in datos/snapshots/snapshot_*.csv; do
            [ -e "$f" ] || continue
            fecha=$(basename "$f" .csv | sed 's/^snapshot_//')
            if [[ "$fecha" > "$lunes" || "$fecha" == "$lunes" ]]; then
              existe_esta_semana=true
              break
            fi
          done
          if [ "$existe_esta_semana" = true ]; then
            echo "Ya existe un snapshot de esta semana (desde $lunes); no se genera otro."
          else
            python -m procesar.unir
          fi

      # Los datos (histórico, calibración) se refrescan en días hábiles, pero
      # el comentario de Claude se limita a cada 2 días para no llamar a la
      # API a diario. Se basa en la fecha_generacion del último comentario
      # guardado (no en el día de la semana), así que es robusto a corridas
      # que fallaron o se saltaron.
      - name: Verificar si toca redactar comentario IA
        id: chequeo_comentario
        run: |
          archivo="datos/comentario/comentario_periodo.json"
          if [ ! -f "$archivo" ]; then
            echo "toca=true" >> "$GITHUB_OUTPUT"
          else
            fecha=$(python -c "import json; print(json.load(open('$archivo'))['fecha_generacion'])")
            dias=$(( ( $(date -u +%s) - $(date -u -d "$fecha" +%s) ) / 86400 ))
            if [ "$dias" -ge 2 ]; then
              echo "toca=true" >> "$GITHUB_OUTPUT"
            else
              echo "toca=false" >> "$GITHUB_OUTPUT"
              echo "Último comentario de hace $dias día(s) ($fecha); aún no tocan 2."
            fi
          fi

      # El comentario queda versionado en datos/comentario/ con fecha y modelo;
      # la app solo lee el archivo (cero llamadas de IA en runtime). La key
      # vive únicamente como secret del repo.
      - name: Redactar comentario del periodo con Claude
        if: steps.chequeo_comentario.outputs.toca == 'true'
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m reporte.comentario_ia

      - name: Confirmar cambios si los hay
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add datos/
          if git diff --cached --quiet; then
            echo "Sin cambios en datos; no se hace commit."
          else
            git commit -m "Datos: actualización automática ($(date -u +%Y-%m-%d))"
            # Si el remoto avanzó entre el checkout y este push, rebasar
            # primero evita que el job falle por un push rechazado.
            git pull --rebase origin main
            git push
          fi
