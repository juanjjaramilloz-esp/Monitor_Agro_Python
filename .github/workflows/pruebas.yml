name: Pruebas

# Corre lint (ruff) y la suite completa (sin internet) en cada push y pull
# request a main. Es la señal de salud del proyecto: si este badge está en
# verde, el código pasa el linter y la lógica de fuentes, procesamiento,
# reportes y simulador pasa sus pruebas.

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Instalar herramientas de desarrollo
        run: pip install -r requirements-dev.txt

      - name: Ejecutar ruff
        run: ruff check .

  pruebas:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar la suite
        run: python -m unittest discover -s tests -v

      - name: Importar la app sin llamadas de red
        env:
          PULSO_CAFETERO_OFFLINE: "1"
        run: python -c "import app"
